<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Feedback System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
margin:0;
background:linear-gradient(135deg,#5f6df0,#9f44d3);
min-height:100vh;
color:#333;
}

header{
text-align:center;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:850px;
margin:auto;
background:rgba(255,255,255,0.95);
padding:30px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#5f6df0;
color:white;
cursor:pointer;
}

button:hover{
background:#4a56e0;
}

.nav{
text-align:center;
margin-bottom:20px;
}

.nav button{
margin:5px;
}

.stars{
font-size:30px;
}

.star{
cursor:pointer;
color:#ccc;
transition:0.2s;
}

.star.active{
color:gold;
transform:scale(1.2);
}

.success{
background:#d1fae5;
padding:12px;
border-radius:8px;
text-align:center;
margin-top:10px;
}

.analytics{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
flex:1;
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#f1f1f1;
}

.delete{
background:#ef4444;
}

.chartBox{
margin-top:30px;
}

</style>
</head>

<body>

<header>Smart Feedback System</header>

<div class="nav">
<button onclick="showPage('form')">Feedback</button>
<button onclick="showPage('login')">Admin</button>
</div>

<!-- FEEDBACK PAGE -->

<div id="formPage" class="container">

<h2>Leave Your Feedback</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<label>Rating</label>

<div class="stars" id="stars">
<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>
</div>

<textarea id="message" placeholder="Your feedback"></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

<div id="success" class="success" style="display:none">
✅ Feedback submitted successfully!
</div>

</div>

<!-- LOGIN -->

<div id="loginPage" class="container" style="display:none">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- ADMIN DASHBOARD -->

<div id="adminPage" class="container" style="display:none">

<h2>Admin Dashboard</h2>

<div class="analytics">

<div class="card">
<h3 id="total"></h3>
<p>Total Feedback</p>
</div>

<div class="card">
<h3 id="average"></h3>
<p>Average Rating</p>
</div>

</div>

<input id="search" placeholder="Search name/email" onkeyup="loadFeedback()">

<select id="filter" onchange="loadFeedback()">
<option value="">All Ratings</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button onclick="exportCSV()">Export CSV</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Rating</th>
<th>Message</th>
<th>Date</th>
<th></th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="chartBox">
<canvas id="chart"></canvas>
</div>

</div>

<script>

let rating=0
let chart

function showPage(page){

document.getElementById("formPage").style.display="none"
document.getElementById("loginPage").style.display="none"
document.getElementById("adminPage").style.display="none"

if(page=="form") document.getElementById("formPage").style.display="block"
if(page=="login") document.getElementById("loginPage").style.display="block"
if(page=="admin"){
document.getElementById("adminPage").style.display="block"
loadFeedback()
}

}

function setRating(value){

rating=value

let stars=document.querySelectorAll(".star")

stars.forEach((s,i)=>{

if(i<value){
s.classList.add("active")
}else{
s.classList.remove("active")
}

})

}

function submitFeedback(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let message=document.getElementById("message").value

let data=JSON.parse(localStorage.getItem("feedback")||"[]")

data.push({
id:Date.now(),
name,
email,
rating,
message,
date:new Date().toLocaleString()
})

localStorage.setItem("feedback",JSON.stringify(data))

document.getElementById("success").style.display="block"

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="admin123"){
showPage("admin")
}else{
alert("Wrong login")
}

}

function loadFeedback(){

let data=JSON.parse(localStorage.getItem("feedback")||"[]")

let search=document.getElementById("search").value.toLowerCase()
let filter=document.getElementById("filter").value

let table=document.getElementById("tableBody")

table.innerHTML=""

let totalRating=0
let ratingCount=[0,0,0,0,0]

data.forEach(f=>{

if(search && !f.name.toLowerCase().includes(search) && !f.email.toLowerCase().includes(search))
return

if(filter && f.rating!=filter)
return

ratingCount[f.rating-1]++

totalRating+=Number(f.rating)

table.innerHTML+=`
<tr>
<td>${f.name}</td>
<td>${f.email}</td>
<td>${f.rating}</td>
<td>${f.message}</td>
<td>${f.date}</td>
<td><button class="delete" onclick="deleteFeedback(${f.id})">Delete</button></td>
</tr>
`

})

document.getElementById("total").innerText=data.length

let avg=(totalRating/(data.length||1)).toFixed(1)

document.getElementById("average").innerText=avg

drawChart(ratingCount)

}

function deleteFeedback(id){

let data=JSON.parse(localStorage.getItem("feedback")||"[]")

data=data.filter(f=>f.id!=id)

localStorage.setItem("feedback",JSON.stringify(data))

loadFeedback()

}

function drawChart(ratings){

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["1⭐","2⭐","3⭐","4⭐","5⭐"],
datasets:[{
label:"Ratings",
data:ratings,
backgroundColor:["#ef4444","#f59e0b","#3b82f6","#10b981","#6366f1"]
}]
}

})

}

function exportCSV(){

let data=JSON.parse(localStorage.getItem("feedback")||"[]")

let rows=["Name,Email,Rating,Message,Date"]

data.forEach(f=>{
rows.push(`${f.name},${f.email},${f.rating},${f.message},${f.date}`)
})

let blob=new Blob([rows.join("\n")],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=dev kathyan.html
a.download="feedback.csv"
a.click()

}

</script>

</body>

</html>
